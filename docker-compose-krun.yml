services:
  spr-wireshark:
    extends:
      file: docker-compose.yml
      service: spr-wireshark
    runtime: ${SPR_KRUN_RUNTIME:-krun-atlas}
    network_mode: host
    annotations:
      krun.cpus: "${SPR_KRUN_CPUS:-2}"
      krun.ram_mib: "${SPR_KRUN_RAM_MIB:-1024}"
      krun.tap_name: "kwireshark0"
      krun.net_mac: "${SPR_KRUN_MAC:-02:53:50:52:4b:14}"
      krun.vsock_path: "/state/plugins/spr-wireshark/socket"
      krun.vsock_port: "4040"
    environment:
      SPR_KRUN_PLUGIN_SOCKET: "/run/spr-krun-plugin/spr-wireshark.sock"
      SPR_KRUN_VSOCK_PORT: "4040"
    devices:
      - "/dev/net/tun:/dev/net/tun"
